<div class="faq">

  <app-page-hero
    label="Vestizo"
    title="Preguntas Frecuentes"
    subtitle="Todo lo que necesitas saber antes de comprar"
  />

  <section class="faq-section">
    <div class="faq-container">

      @for (grupo of grupos; track grupo.titulo) {
        <div class="faq-group">

          <div class="faq-group__header">
            <i class="pi {{ grupo.icono }}"></i>
            <h2>{{ grupo.titulo }}</h2>
          </div>

          <div class="faq-list">
            @for (item of grupo.items; track item.pregunta) {
              <div class="faq-item" [class.faq-item--open]="item.abierta">
                <button class="faq-item__trigger" (click)="toggle(item)">
                  <span>{{ item.pregunta }}</span>
                  <i class="pi" [class.pi-plus]="!item.abierta" [class.pi-minus]="item.abierta"></i>
                </button>
                @if (item.abierta) {
                  <div class="faq-item__body">
                    <p>{{ item.respuesta }}</p>
                  </div>
                }
              </div>
            }
          </div>

        </div>
      }

    </div>
  </section>

</div>
