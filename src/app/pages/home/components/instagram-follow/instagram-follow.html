<section class="instagram-follow section">
  <div class="container">
    <div class="instagram-content">
      <span class="instagram-label">follow us!</span>
      <div class="instagram-icon">
        <i class="pi pi-instagram"></i>
      </div>
      <a 
        [href]="instagramUrl" 
        target="_blank" 
        rel="noopener noreferrer"
        class="instagram-handle"
      >
        {{ instagramHandle }}
      </a>
    </div>
  </div>
</section>
